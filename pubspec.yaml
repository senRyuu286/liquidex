name: liquidex
description: "A mobile application designed to track daily liquid consumption and manage personalized health boundaries for hydration, sugar, and caffeine intake."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  cloud_firestore: ^6.5.0
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  riverpod_annotation: ^4.0.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.3
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true

  assets: 
    - assets/
    - assets/logo/